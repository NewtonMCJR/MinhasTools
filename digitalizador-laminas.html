<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digitalização de Lâminas | CDEPAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen p-4 md:p-8">

    <div class="max-w-2xl mx-auto">
        <a href="index.html" class="inline-flex items-center text-teal-600 hover:text-teal-800 font-medium mb-6 transition-colors">
            <i class="fa-solid fa-arrow-left mr-2"></i> Voltar ao Painel
        </a>

        <div class="bg-white p-6 md:p-8 rounded-xl shadow-lg border-t-4 border-teal-500">
            
            <header class="mb-8 text-center md:text-left flex flex-col md:flex-row items-center md:items-start gap-4">
                <div class="w-16 h-16 bg-teal-600 text-teal-100 rounded-2xl flex items-center justify-center text-3xl shadow-md shrink-0">
                    <i class="fa-solid fa-microscope"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black text-gray-800 tracking-tight">MUSEU DA PATOLOGIA - CDEPAT</h1>
                    <p class="text-teal-600 font-bold uppercase text-xs tracking-widest mt-1">Leitor de Fichas de Lâminas Coradas</p>
                    <p class="text-sm text-gray-500 mt-2">Extração inteligente de dados manuscritos para CSV usando IA.</p>
                </div>
            </header>

            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-2 ml-1" for="apiKey">Chave de API (Gemini):</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-solid fa-key text-gray-400"></i>
                        </div>
                        <input type="password" id="apiKey"
                            class="w-full pl-10 p-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 transition-all outline-none font-mono text-sm text-gray-700"
                            value="AIzaSyDIT9vQj4sfP6aUqk-AYFPImxnJl7HBdIA">
                    </div>
                </div>

                <div class="group relative border-2 border-dashed border-gray-300 rounded-xl p-8 text-center hover:border-teal-400 hover:bg-teal-50/50 transition-all cursor-pointer bg-gray-50">
                    <input type="file" id="pdfInput" accept="application/pdf"
                        class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                    <div class="space-y-3">
                        <div class="bg-teal-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto group-hover:scale-110 transition-transform shadow-sm">
                            <i class="fa-solid fa-file-pdf text-2xl text-teal-600"></i>
                        </div>
                        <p id="fileName" class="text-gray-700 font-semibold">Arraste ou clique para enviar o PDF</p>
                        <p class="text-gray-400 text-xs text-center font-medium">Ficha de inventário com preenchimento manual</p>
                    </div>
                </div>

                <button id="processBtn"
                    class="w-full bg-teal-600 hover:bg-teal-700 text-white font-black py-4 rounded-xl shadow-md transform active:scale-[0.98] transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> GERAR ARQUIVO CSV
                </button>

                <div id="status" class="hidden text-center p-4 rounded-xl text-sm font-bold border"></div>
            </div>
        </div>
    </div>

    <script>
        const pdfInput = document.getElementById('pdfInput');
        const fileNameDisplay = document.getElementById('fileName');
        const processBtn = document.getElementById('processBtn');
        const status = document.getElementById('status');
        let nomeBaseArquivo = "inventario";

        pdfInput.addEventListener('change', e => {
            const file = e.target.files[0];
            if (file) {
                // Atualiza a interface usando classes e ícone
                fileNameDisplay.innerHTML = `<span class="text-teal-700 font-bold"><i class="fa-solid fa-check mr-1"></i> Selecionado:</span> ${file.name}`;
                
                // Captura o nome e remove a extensão
                nomeBaseArquivo = file.name.replace(/\.[^/.]+$/, "");
            }
        });

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = error => reject(error);
        });

        processBtn.addEventListener('click', async () => {
            const key = document.getElementById('apiKey').value;
            const file = pdfInput.files[0];

            if (!file) {
                status.className = "block text-center p-4 rounded-xl bg-orange-50 text-orange-700 border-orange-200 mt-4";
                status.innerHTML = '<i class="fa-solid fa-triangle-exclamation mr-1"></i> Por favor selecione o PDF da ficha.';
                return;
            }

            try {
                processBtn.disabled = true;
                processBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> PROCESSANDO...';
                
                status.className = "block text-center p-4 rounded-xl bg-blue-50 text-blue-700 border-blue-200 animate-pulse mt-4";
                status.innerHTML = '<i class="fa-solid fa-microchip mr-1"></i> Aguarde! A IA está analisando a caligrafia...';

                const base64Data = await toBase64(file);

                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;

                const prompt = `Analise o ficheiro em anexo (ficha de inventário de lâminas). Extraia os dados e formate em CSV.
                Cabeçalho: pos,numero,bloco,coloracao,pesquisador
                Regras:
                1. numero: Use formato E-XXXXX/YY.
                2. Símbolos ", H ou 〃: Repita o valor da linha superior.
                3. Símbolo "11" no pesquisador: Repita o nome do pesquisador anterior.
                4. Colorações mais comuns de aparecer são HE, GL, PAS 1.0, PAS 2.5, PAS-PW, SR, Elástica, TM, RG, RFS, RFC, PSR, Perls, Grocott, PMA-PS, AB-SAFRA, Aliz-Berb e SR-EOS. Se aparecer algo diferente, tente identificar a coloração mais próxima.
                Retorne APENAS o CSV puro, sem introduções ou blocos de código markdown.`;

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: prompt },
                                { inline_data: { mime_type: "application/pdf", data: base64Data } }
                            ]
                        }]
                    })
                });

                const data = await response.json();

                if (data.error) throw new Error(data.error.message);

                let csvText = data.candidates[0].content.parts[0].text.trim();

                // Limpeza de Markdown redundante
                csvText = csvText.replace(/```(?:csv)?/gi, "").replace(/```/g, "").trim();

                downloadCSV(csvText);

                status.className = "block text-center p-4 rounded-xl bg-green-50 text-green-700 border-green-200 mt-4";
                status.innerHTML = '<i class="fa-solid fa-check-circle mr-1"></i> Concluído! Arquivo CSV gerado com sucesso.';

            } catch (error) {
                console.error(error);
                status.className = "block text-center p-4 rounded-xl bg-red-50 text-red-700 border-red-200 mt-4";
                status.innerHTML = '<i class="fa-solid fa-circle-xmark mr-1"></i> Erro: ' + error.message;
            } finally {
                processBtn.disabled = false;
                processBtn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> GERAR ARQUIVO CSV';
            }
        });

        function downloadCSV(content) {
            // Adiciona o BOM (\ufeff) para o Excel reconhecer acentos corretamente
            const blob = new Blob(["\ufeff" + content], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");

            link.href = url;
            link.download = `${nomeBaseArquivo}.csv`;

            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
