<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesclador de PDF Alternado | Ferramentas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen p-4 md:p-8">

    <div class="max-w-3xl mx-auto">
        <a href="index.html" class="inline-flex items-center text-blue-600 hover:text-blue-800 font-medium mb-6 transition-colors">
            <i class="fa-solid fa-arrow-left mr-2"></i> Voltar ao Painel
        </a>

        <div class="bg-white p-6 md:p-8 rounded-xl shadow-lg border-t-4 border-blue-500">
            
            <header class="mb-8 text-center md:text-left flex flex-col md:flex-row items-center md:items-start gap-4">
                <div class="w-16 h-16 bg-blue-600 text-blue-100 rounded-2xl flex items-center justify-center text-3xl shadow-md shrink-0">
                    <i class="fa-solid fa-layer-group"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black text-gray-800 tracking-tight">Mesclador de PDFs Alternados</h1>
                    <p class="text-blue-600 font-bold uppercase text-xs tracking-widest mt-1">União Intercalada de Documentos</p>
                    <p class="text-sm text-gray-500 mt-2">Gere um novo PDF intercalando as páginas automaticamente (Pág 1 do Arq 1, Pág 1 do Arq 2, etc).</p>
                </div>
            </header>

            <div class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    
                    <div class="group relative border-2 border-dashed border-gray-300 rounded-xl p-6 text-center hover:border-blue-400 hover:bg-blue-50/50 transition-all cursor-pointer bg-gray-50 flex flex-col justify-center h-48">
                        <input type="file" id="pdf1" accept="application/pdf"
                            class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                        <div class="space-y-2">
                            <div class="bg-blue-100 w-12 h-12 rounded-full flex items-center justify-center mx-auto group-hover:scale-110 transition-transform shadow-sm">
                                <i class="fa-solid fa-file-pdf text-xl text-blue-600"></i>
                            </div>
                            <p id="fileName1" class="text-gray-700 font-semibold text-sm">PDF 1 (Páginas Ímpares)</p>
                            <p class="text-gray-400 text-xs text-center font-medium">Arraste ou clique para enviar</p>
                        </div>
                    </div>

                    <div class="group relative border-2 border-dashed border-gray-300 rounded-xl p-6 text-center hover:border-blue-400 hover:bg-blue-50/50 transition-all cursor-pointer bg-gray-50 flex flex-col justify-center h-48">
                        <input type="file" id="pdf2" accept="application/pdf"
                            class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                        <div class="space-y-2">
                            <div class="bg-blue-100 w-12 h-12 rounded-full flex items-center justify-center mx-auto group-hover:scale-110 transition-transform shadow-sm">
                                <i class="fa-solid fa-file-pdf text-xl text-blue-600"></i>
                            </div>
                            <p id="fileName2" class="text-gray-700 font-semibold text-sm">PDF 2 (Páginas Pares)</p>
                            <p class="text-gray-400 text-xs text-center font-medium">Arraste ou clique para enviar</p>
                        </div>
                    </div>

                </div>

                <button id="btnMesclar" onclick="processarPDFs()" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl shadow-md transform active:scale-[0.98] transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                    <i class="fa-solid fa-object-group"></i> MESCLAR E BAIXAR PDF
                </button>

                <div id="status" class="hidden text-center p-4 rounded-xl text-sm font-bold border mt-4"></div>
            </div>
        </div>
    </div>

    <script>
        // Atualiza a interface quando seleciona os arquivos
        document.getElementById('pdf1').addEventListener('change', e => {
            if (e.target.files[0]) {
                document.getElementById('fileName1').innerHTML = `<span class="text-blue-700 font-bold"><i class="fa-solid fa-check mr-1"></i></span> ${e.target.files[0].name}`;
            }
        });

        document.getElementById('pdf2').addEventListener('change', e => {
            if (e.target.files[0]) {
                document.getElementById('fileName2').innerHTML = `<span class="text-blue-700 font-bold"><i class="fa-solid fa-check mr-1"></i></span> ${e.target.files[0].name}`;
            }
        });

        async function processarPDFs() {
            const fileInput1 = document.getElementById('pdf1');
            const fileInput2 = document.getElementById('pdf2');
            const btn = document.getElementById('btnMesclar');

            // Validação simples
            if (fileInput1.files.length === 0 || fileInput2.files.length === 0) {
                mostrarStatus('<i class="fa-solid fa-triangle-exclamation mr-1"></i> Por favor, selecione os dois arquivos PDF.', 'bg-orange-50 text-orange-700 border-orange-200');
                return;
            }

            try {
                // Atualiza UI para carregamento
                btn.disabled = true;
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> MESCLANDO...';
                mostrarStatus('<i class="fa-solid fa-microchip mr-1"></i> Processando os PDFs... Aguarde.', 'bg-blue-50 text-blue-700 border-blue-200 animate-pulse');

                // Lendo os arquivos como ArrayBuffer
                const arrayBuffer1 = await fileInput1.files[0].arrayBuffer();
                const arrayBuffer2 = await fileInput2.files[0].arrayBuffer();

                // Carregando os PDFs com a biblioteca pdf-lib
                const pdfDoc1 = await PDFLib.PDFDocument.load(arrayBuffer1);
                const pdfDoc2 = await PDFLib.PDFDocument.load(arrayBuffer2);

                // Criando um novo documento em branco
                const mergedPdf = await PDFLib.PDFDocument.create();

                const count1 = pdfDoc1.getPageCount();
                const count2 = pdfDoc2.getPageCount();
                const maxPages = Math.max(count1, count2);

                // Loop para intercalar as páginas
                for (let i = 0; i < maxPages; i++) {
                    // Adiciona a página do PDF 1, se existir
                    if (i < count1) {
                        const [page1] = await mergedPdf.copyPages(pdfDoc1, [i]);
                        mergedPdf.addPage(page1);
                    }
                    // Adiciona a página do PDF 2, se existir
                    if (i < count2) {
                        const [page2] = await mergedPdf.copyPages(pdfDoc2, [i]);
                        mergedPdf.addPage(page2);
                    }
                }

                // Salva o novo PDF em um Uint8Array
                const pdfBytes = await mergedPdf.save();

                // Cria um Blob e aciona o download
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = 'pdf_intercalado.pdf';
                document.body.appendChild(a);
                a.click();
                
                // Limpeza
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                mostrarStatus('<i class="fa-solid fa-check-circle mr-1"></i> Pronto! PDF gerado e baixado com sucesso.', 'bg-green-50 text-green-700 border-green-200');

            } catch (error) {
                console.error(error);
                mostrarStatus('<i class="fa-solid fa-circle-xmark mr-1"></i> Ocorreu um erro ao processar os PDFs.', 'bg-red-50 text-red-700 border-red-200');
            } finally {
                // Restaura o botão
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-object-group"></i> MESCLAR E BAIXAR PDF';
            }
        }

        function mostrarStatus(mensagem, classesCor) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = mensagem;
            statusDiv.className = `text-center p-4 rounded-xl text-sm font-bold border mt-4 block ${classesCor}`;
        }
    </script>
</body>
</html>
