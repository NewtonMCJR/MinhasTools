<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unir PDFs do ZIP | Ferramentas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen p-4 md:p-8">

    <div class="max-w-2xl mx-auto">
        <a href="index.html" class="inline-flex items-center text-red-600 hover:text-red-800 font-medium mb-6 transition-colors">
            <i class="fa-solid fa-arrow-left mr-2"></i> Voltar ao Painel
        </a>

        <div class="bg-white p-6 md:p-8 rounded-xl shadow-lg border-t-4 border-red-500">
            
            <header class="mb-8 text-center md:text-left flex flex-col md:flex-row items-center md:items-start gap-4">
                <div class="w-16 h-16 bg-red-600 text-red-100 rounded-2xl flex items-center justify-center text-3xl shadow-md shrink-0">
                    <i class="fa-solid fa-file-export"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black text-gray-800 tracking-tight">Unir PDFs do ZIP</h1>
                    <p class="text-red-600 font-bold uppercase text-xs tracking-widest mt-1">Extração e Mesclagem em Lote</p>
                    <p class="text-sm text-gray-500 mt-2">Envie um arquivo .zip contendo vários PDFs. O sistema irá extrair, ordenar numericamente e gerar um PDF único com todas as páginas.</p>
                </div>
            </header>

            <div class="space-y-6">
                <div class="group relative border-2 border-dashed border-gray-300 rounded-xl p-8 text-center hover:border-red-400 hover:bg-red-50/50 transition-all cursor-pointer bg-gray-50">
                    <input type="file" id="zipInput" accept=".zip,application/zip"
                        class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                    <div class="space-y-3">
                        <div class="bg-red-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto group-hover:scale-110 transition-transform shadow-sm">
                            <i class="fa-solid fa-file-zipper text-2xl text-red-600"></i>
                        </div>
                        <p id="fileName" class="text-gray-700 font-semibold">Arraste ou clique para enviar o arquivo ZIP</p>
                        <p class="text-gray-400 text-xs text-center font-medium">Contendo apenas arquivos PDF</p>
                    </div>
                </div>

                <button id="btnProcessar" onclick="processarZip()" 
                    class="w-full bg-red-600 hover:bg-red-700 text-white font-black py-4 rounded-xl shadow-md transform active:scale-[0.98] transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                    <i class="fa-solid fa-layer-group"></i> EXTRAIR, UNIR E BAIXAR PDF
                </button>

                <div id="status" class="hidden text-center p-4 rounded-xl text-sm font-bold border mt-4"></div>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('zipInput');
        const fileNameDisplay = document.getElementById('fileName');

        // Atualiza a interface quando seleciona o arquivo
        fileInput.addEventListener('change', e => {
            const file = e.target.files[0];
            if (file) {
                fileNameDisplay.innerHTML = `<span class="text-red-700 font-bold"><i class="fa-solid fa-check mr-1"></i> Selecionado:</span> ${file.name}`;
            }
        });

        async function processarZip() {
            const btn = document.getElementById('btnProcessar');

            // Validações
            if (fileInput.files.length === 0) {
                mostrarStatus('<i class="fa-solid fa-triangle-exclamation mr-1"></i> Por favor, selecione o arquivo ZIP.', 'bg-orange-50 text-orange-700 border-orange-200');
                return;
            }

            try {
                // Atualiza UI
                btn.disabled = true;
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> PROCESSANDO...';
                mostrarStatus('<i class="fa-solid fa-microchip mr-1"></i> Lendo o arquivo ZIP e ordenando os PDFs... Aguarde.', 'bg-blue-50 text-blue-700 border-blue-200 animate-pulse');

                // Carrega o ZIP
                const zipData = await fileInput.files[0].arrayBuffer();
                const zip = await JSZip.loadAsync(zipData);
                
                // Filtra apenas os arquivos PDF
                const pdfFiles = [];
                zip.forEach((relativePath, zipEntry) => {
                    if (!zipEntry.dir && relativePath.toLowerCase().endsWith('.pdf')) {
                        pdfFiles.push(zipEntry);
                    }
                });

                if (pdfFiles.length === 0) {
                    mostrarStatus('<i class="fa-solid fa-circle-exclamation mr-1"></i> Nenhum arquivo PDF encontrado dentro do ZIP.', 'bg-red-50 text-red-700 border-red-200');
                    return;
                }

                // Ordenação Natural: Garante que Cx_2 venha antes de Cx_10
                pdfFiles.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' }));

                mostrarStatus(`<i class="fa-solid fa-microchip mr-1"></i> Unindo ${pdfFiles.length} PDFs... Isso pode levar alguns segundos.`, 'bg-blue-50 text-blue-700 border-blue-200 animate-pulse');

                // Cria o novo PDF gigante
                const mergedPdf = await PDFLib.PDFDocument.create();

                // Loop para ler cada PDF do ZIP e colar no PDF gigante
                for (const zipEntry of pdfFiles) {
                    // Extrai o PDF do ZIP para a memória
                    const pdfBytes = await zipEntry.async('uint8array');
                    
                    // Carrega o PDF extraído
                    const pdf = await PDFLib.PDFDocument.load(pdfBytes);
                    
                    // Copia todas as páginas e cola no PDF gigante
                    const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                    copiedPages.forEach((page) => {
                        mergedPdf.addPage(page);
                    });
                }

                // Salva o PDF final
                const finalPdfBytes = await mergedPdf.save();
                
                // Força o download do PDF
                const blob = new Blob([finalPdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                
                // Usa o nome original do ZIP para nomear o PDF final
                const nomeBase = fileInput.files[0].name.replace(/\.[^/.]+$/, "");
                a.download = `${nomeBase}_Unido.pdf`;
                
                document.body.appendChild(a);
                a.click();
                
                // Limpeza
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                mostrarStatus(`<i class="fa-solid fa-check-circle mr-1"></i> Pronto! ${pdfFiles.length} PDFs foram unidos em um único arquivo com sucesso.`, 'bg-green-50 text-green-700 border-green-200');

            } catch (error) {
                console.error(error);
                mostrarStatus('<i class="fa-solid fa-circle-xmark mr-1"></i> Ocorreu um erro ao processar o arquivo ZIP.', 'bg-red-50 text-red-700 border-red-200');
            } finally {
                // Restaura o botão
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-layer-group"></i> EXTRAIR, UNIR E BAIXAR PDF';
            }
        }

        function mostrarStatus(mensagem, classesCor) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = mensagem;
            statusDiv.className = `text-center p-4 rounded-xl text-sm font-bold border mt-4 block ${classesCor}`;
            statusDiv.classList.remove('hidden');
        }
    </script>
</body>
</html>
