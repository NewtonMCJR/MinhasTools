<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Etiquetas | Ferramentas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen p-4 md:p-8">

    <div class="max-w-3xl mx-auto">
        <a href="index.html" class="inline-flex items-center text-amber-600 hover:text-amber-800 font-medium mb-6 transition-colors">
            <i class="fa-solid fa-arrow-left mr-2"></i> Voltar ao Painel
        </a>

        <div class="bg-white p-6 md:p-8 rounded-xl shadow-lg border-t-4 border-amber-500">
            
            <header class="mb-8 text-center md:text-left flex flex-col md:flex-row items-center md:items-start gap-4">
                <div class="w-16 h-16 bg-amber-600 text-amber-100 rounded-2xl flex items-center justify-center text-3xl shadow-md shrink-0">
                    <i class="fa-solid fa-tags"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black text-gray-800 tracking-tight">Gerador de Etiquetas</h1>
                    <p class="text-amber-600 font-bold uppercase text-xs tracking-widest mt-1">Código de Barras (Lombada Vertical)</p>
                    <p class="text-sm text-gray-500 mt-2">Gere o PDF das etiquetas. Numeração em pé (upright) e espaçada para leitura em caixas acondicionadas como livros.</p>
                </div>
            </header>

            <div class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-gray-50 p-6 rounded-xl border border-gray-200">
                    
                    <div>
                        <label class="block text-xs font-bold text-gray-600 uppercase mb-2 ml-1" for="tipoPapel">Tipo de Papel/Formato:</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fa-solid fa-scroll text-gray-400"></i>
                            </div>
                            <select id="tipoPapel" class="w-full pl-10 p-3 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 transition-all outline-none font-mono text-sm text-gray-700 shadow-sm appearance-none">
                                <option value="a4" selected>Folha A4 Lisa (7,5x1,8cm)</option>
                                <option value="pimaco6085">Pimaco 6085 (Gabarito Exato)</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-600 uppercase mb-2 ml-1" for="colecao">Coleção:</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fa-solid fa-folder-open text-gray-400"></i>
                            </div>
                            <select id="colecao" onchange="toggleColecaoOutro()" class="w-full pl-10 p-3 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 transition-all outline-none font-mono text-sm text-gray-700 shadow-sm appearance-none">
                                <option value="CDEPAT" selected>CDEPAT</option>
                                <option value="CFA">CFA</option>
                                <option value="CSAP">CSAP</option>
                                <option value="OUTRO">Outro (Especificar...)</option>
                            </select>
                        </div>
                        <div id="divColecaoOutro" class="relative mt-2 hidden transition-all">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fa-solid fa-pen text-gray-400"></i>
                            </div>
                            <input type="text" id="colecaoOutro" placeholder="Sigla (Máx 12 letras)" maxlength="12"
                                class="w-full pl-10 p-3 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 transition-all outline-none font-mono text-sm text-gray-700 shadow-sm uppercase">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-600 uppercase mb-2 ml-1" for="numInicio">Nº Inicial da Caixa:</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fa-solid fa-hashtag text-gray-400"></i>
                            </div>
                            <input type="number" id="numInicio" placeholder="Ex: 1" value="1" min="1"
                                class="w-full pl-10 p-3 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 transition-all outline-none font-mono text-sm text-gray-700 shadow-sm">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-600 uppercase mb-2 ml-1" for="qtdEtiquetas">Quantidade Total:</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fa-solid fa-layer-group text-gray-400"></i>
                            </div>
                            <input type="number" id="qtdEtiquetas" placeholder="Ex: 30" value="30" min="1"
                                class="w-full pl-10 p-3 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 transition-all outline-none font-mono text-sm text-gray-700 shadow-sm">
                        </div>
                    </div>
                </div>

                <button id="btnProcessar" onclick="gerarEtiquetas()" 
                    class="w-full bg-amber-500 hover:bg-amber-600 text-white font-black py-4 rounded-xl shadow-md transform active:scale-[0.98] transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                    <i class="fa-solid fa-print"></i> GERAR PDF DE ETIQUETAS
                </button>

                <div id="status" class="hidden text-center p-4 rounded-xl text-sm font-bold border mt-4"></div>
            </div>
        </div>
    </div>

    <canvas id="barcodeCanvas" style="display: none;"></canvas>

    <script>
        // Função para mostrar/esconder o campo customizado de coleção
        function toggleColecaoOutro() {
            const select = document.getElementById('colecao');
            const divOutro = document.getElementById('divColecaoOutro');
            
            if (select.value === 'OUTRO') {
                divOutro.classList.remove('hidden');
                document.getElementById('colecaoOutro').focus();
            } else {
                divOutro.classList.add('hidden');
            }
        }

        async function gerarEtiquetas() {
            const tipoPapel = document.getElementById('tipoPapel').value;
            const inicio = parseInt(document.getElementById('numInicio').value);
            const qtd = parseInt(document.getElementById('qtdEtiquetas').value);
            const selectColecao = document.getElementById('colecao').value;
            const btn = document.getElementById('btnProcessar');
            const canvas = document.getElementById('barcodeCanvas');

            // Determina qual é o texto da coleção a ser impresso
            let textoColecao = selectColecao;
            if (selectColecao === 'OUTRO') {
                textoColecao = document.getElementById('colecaoOutro').value.trim().toUpperCase();
            }

            // Validações
            if (isNaN(inicio) || isNaN(qtd) || inicio < 1 || qtd < 1) {
                mostrarStatus('<i class="fa-solid fa-circle-exclamation mr-1"></i> Preencha valores válidos para o Início e a Quantidade.', 'bg-red-50 text-red-700 border-red-200');
                return;
            }
            if (textoColecao === '') {
                mostrarStatus('<i class="fa-solid fa-circle-exclamation mr-1"></i> Por favor, digite a sigla da coleção customizada.', 'bg-red-50 text-red-700 border-red-200');
                return;
            }

            try {
                btn.disabled = true;
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> GERANDO DOCUMENTO...';
                mostrarStatus('<i class="fa-solid fa-microchip mr-1"></i> Formatando textos na vertical e gerando códigos...', 'bg-amber-50 text-amber-700 border-amber-200 animate-pulse');

                // Variáveis de Configuração do Papel
                let paperFormat, cols, rows, labelWidth, labelHeight, gapX, gapY, marginX, marginY, drawBorder;

                if (tipoPapel === 'a4') {
                    // Configuração: Folha A4 com bordas (75x18mm) - 32 Etiquetas
                    paperFormat = "a4"; // 210 x 297 mm
                    cols = 2;
                    rows = 16;
                    labelWidth = 75; 
                    labelHeight = 18;
                    gapX = 10;
                    gapY = 0;
                    
                    const totalGridWidth = (cols * labelWidth) + ((cols - 1) * gapX);
                    marginX = (210 - totalGridWidth) / 2;
                    marginY = (297 - (rows * labelHeight)) / 2;
                    drawBorder = true; // Imprime borda para corte manual
                } else {
                    // Configuração: Pimaco 6085 (Tamanho Carta: 215,9 x 279,4 mm) - 30 Etiquetas
                    paperFormat = "letter";
                    cols = 3;
                    rows = 10;
                    labelWidth = 66.7;
                    labelHeight = 25.4;
                    gapX = 2.5;  
                    gapY = 0;    
                    marginX = 5.4; 
                    marginY = 12.7; 
                    drawBorder = false; // SEM borda (gabarito picotado)
                }

                // Inicializa o jsPDF
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: paperFormat });

                let currentCol = 0;
                let currentRow = 0;

                for (let i = 0; i < qtd; i++) {
                    let numCaixa = inicio + i;
                    let strNum = String(numCaixa).padStart(4, '0'); // Ex: "0001"
                    // Dá aquele espaçamento legal entre os números, sem rotacioná-los
                    let numEspacado = strNum.split('').join('  '); 

                    let x = marginX + (currentCol * labelWidth) + (currentCol * gapX);
                    let y = marginY + (currentRow * labelHeight) + (currentRow * gapY);

                    // --- DESENHO DA ETIQUETA ---
                    
                    // Desenha a borda (Apenas para A4 Lisa)
                    if (drawBorder) {
                        doc.setLineWidth(0.3);
                        doc.setDrawColor(0);
                        doc.rect(x, y, labelWidth, labelHeight);
                        doc.setLineWidth(0.2); 
                    }

                    if (tipoPapel === 'a4') {
                        // NOME DA COLEÇÃO DINÂMICA (Rotacionado 90 graus CCW para leitura de baixo para cima)
                        doc.setFontSize(8);
                        doc.setFont("helvetica", "bold");
                        doc.text(textoColecao, x + 4, y + labelHeight - 3, { angle: 90 });

                        // Número Espaçado (EM PÉ / Upright) - Sem rotação
                        doc.setFontSize(14);
                        doc.setFont("helvetica", "bold");
                        doc.text(numEspacado, x + 10, y + 11.5);

                        // Código de Barras (Horizontal, à Direita)
                        JsBarcode(canvas, strNum, { format: "CODE128", displayValue: false, margin: 0, width: 4, height: 40 });
                        const barcodeDataURL = canvas.toDataURL("image/jpeg");
                        doc.addImage(barcodeDataURL, 'JPEG', x + labelWidth - 35 - 3, y + 3, 35, 12);
                    
                    } else {
                        // Layout Pimaco 6085
                        doc.setFontSize(10);
                        doc.setFont("helvetica", "bold");
                        doc.text(textoColecao, x + 5, y + labelHeight - 6, { angle: 90 });

                        // Número Espaçado (EM PÉ / Upright) - Sem rotação
                        doc.setFontSize(16);
                        doc.setFont("helvetica", "bold");
                        doc.text(numEspacado, x + 12, y + 15);

                        // Código de Barras
                        JsBarcode(canvas, strNum, { format: "CODE128", displayValue: false, margin: 0, width: 4, height: 40 });
                        const barcodeDataURL = canvas.toDataURL("image/jpeg");
                        doc.addImage(barcodeDataURL, 'JPEG', x + 31, y + 6, 32, 14);
                    }

                    // --- LÓGICA DE POSICIONAMENTO ---
                    currentCol++;
                    if (currentCol >= cols) {
                        currentCol = 0;
                        currentRow++;
                    }

                    // Quebra de página
                    if (currentRow >= rows && i < qtd - 1) {
                        doc.addPage();
                        currentCol = 0;
                        currentRow = 0;
                    }
                }

                // Salva o documento
                const fim = inicio + qtd - 1;
                // O nome do arquivo salvo agora carrega o nome da coleção pra ajudar a organizar!
                const nomeSeguro = textoColecao.replace(/[^A-Z0-9]/ig, "_");
                const nomeArquivo = tipoPapel === 'a4' 
                    ? `Etiquetas_${nomeSeguro}_A4_${inicio}_ate_${fim}.pdf` 
                    : `Etiquetas_${nomeSeguro}_Pimaco_${inicio}_ate_${fim}.pdf`;
                
                doc.save(nomeArquivo);

                mostrarStatus(`<i class="fa-solid fa-check-circle mr-1"></i> Sucesso! Seu PDF da coleção <b>${textoColecao}</b> foi gerado.`, 'bg-green-50 text-green-700 border-green-200');

            } catch (error) {
                console.error(error);
                mostrarStatus('<i class="fa-solid fa-circle-xmark mr-1"></i> Ocorreu um erro técnico ao gerar o PDF.', 'bg-red-50 text-red-700 border-red-200');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-print"></i> GERAR PDF DE ETIQUETAS';
            }
        }

        function mostrarStatus(mensagem, classesCor) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = mensagem;
            statusDiv.className = `text-center p-4 rounded-xl text-sm font-bold border mt-4 block ${classesCor}`;
            statusDiv.classList.remove('hidden');
        }
    </script>
</body>
</html>
