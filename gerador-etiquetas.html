<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Etiquetas | Ferramentas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen p-4 md:p-8">

    <div class="max-w-2xl mx-auto">
        <a href="index.html" class="inline-flex items-center text-amber-600 hover:text-amber-800 font-medium mb-6 transition-colors">
            <i class="fa-solid fa-arrow-left mr-2"></i> Voltar ao Painel
        </a>

        <div class="bg-white p-6 md:p-8 rounded-xl shadow-lg border-t-4 border-amber-500">
            
            <header class="mb-8 text-center md:text-left flex flex-col md:flex-row items-center md:items-start gap-4">
                <div class="w-16 h-16 bg-amber-600 text-amber-100 rounded-2xl flex items-center justify-center text-3xl shadow-md shrink-0">
                    <i class="fa-solid fa-tags"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black text-gray-800 tracking-tight">Gerador de Etiquetas (Caixas)</h1>
                    <p class="text-amber-600 font-bold uppercase text-xs tracking-widest mt-1">Medida Exata: 7,5 x 1,8 cm</p>
                    <p class="text-sm text-gray-500 mt-2">Layout otimizado: Numeração à esquerda, Código de Barras à direita e borda completa para corte e alinhamento.</p>
                </div>
            </header>

            <div class="space-y-6">
                <div class="flex flex-col sm:flex-row gap-4 bg-gray-50 p-6 rounded-xl border border-gray-200">
                    <div class="w-full sm:w-1/2">
                        <label class="block text-xs font-bold text-gray-600 uppercase mb-2 ml-1" for="numInicio">Nº Inicial da Caixa:</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fa-solid fa-hashtag text-gray-400"></i>
                            </div>
                            <input type="number" id="numInicio" placeholder="Ex: 1" value="1" min="1"
                                class="w-full pl-10 p-3 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 transition-all outline-none font-mono text-sm text-gray-700 shadow-sm">
                        </div>
                    </div>
                    <div class="w-full sm:w-1/2">
                        <label class="block text-xs font-bold text-gray-600 uppercase mb-2 ml-1" for="qtdEtiquetas">Quantidade (Total):</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fa-solid fa-layer-group text-gray-400"></i>
                            </div>
                            <input type="number" id="qtdEtiquetas" placeholder="Ex: 32" value="32" min="1"
                                class="w-full pl-10 p-3 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 transition-all outline-none font-mono text-sm text-gray-700 shadow-sm">
                        </div>
                    </div>
                </div>

                <button id="btnProcessar" onclick="gerarEtiquetas()" 
                    class="w-full bg-amber-500 hover:bg-amber-600 text-white font-black py-4 rounded-xl shadow-md transform active:scale-[0.98] transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                    <i class="fa-solid fa-print"></i> GERAR PDF DE ETIQUETAS
                </button>

                <div id="status" class="hidden text-center p-4 rounded-xl text-sm font-bold border mt-4"></div>
            </div>
        </div>
    </div>

    <canvas id="barcodeCanvas" style="display: none;"></canvas>

    <script>
        async function gerarEtiquetas() {
            const inicio = parseInt(document.getElementById('numInicio').value);
            const qtd = parseInt(document.getElementById('qtdEtiquetas').value);
            const btn = document.getElementById('btnProcessar');
            const canvas = document.getElementById('barcodeCanvas');

            // Validações
            if (isNaN(inicio) || isNaN(qtd) || inicio < 1 || qtd < 1) {
                mostrarStatus('<i class="fa-solid fa-circle-exclamation mr-1"></i> Preencha valores válidos para o Início e a Quantidade.', 'bg-red-50 text-red-700 border-red-200');
                return;
            }

            try {
                // Atualiza UI
                btn.disabled = true;
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> GERANDO DOCUMENTO...';
                mostrarStatus('<i class="fa-solid fa-microchip mr-1"></i> Calculando medidas e desenhando códigos... Aguarde.', 'bg-amber-50 text-amber-700 border-amber-200 animate-pulse');

                // Inicializa o jsPDF (A4 em milímetros, retrato)
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });

                // Configurações da grade baseadas nas medidas solicitadas (75mm x 18mm)
                // Numa folha A4 (210x297mm) cabem 2 colunas e 16 linhas com margens seguras.
                const cols = 2;
                const rows = 16;
                
                // Margens e Espaçamentos para centralizar a grade na folha
                const labelWidth = 75; 
                const labelHeight = 18;
                const gapX = 10; // Espaço entre as duas colunas

                // Cálculo automático das margens da folha para centralizar
                const totalGridWidth = (cols * labelWidth) + ((cols - 1) * gapX);
                const marginX = (210 - totalGridWidth) / 2; // Margem esquerda/direita
                const marginY = (297 - (rows * labelHeight)) / 2; // Margem superior/inferior

                let currentCol = 0;
                let currentRow = 0;

                for (let i = 0; i < qtd; i++) {
                    let numCaixa = inicio + i;
                    // Formata para 4 dígitos, ex: 1 vira "0001"
                    let strNum = String(numCaixa).padStart(4, '0');

                    // Calcula a posição X e Y (canto superior esquerdo) da etiqueta atual
                    let x = marginX + (currentCol * labelWidth) + (currentCol * gapX);
                    let y = marginY + (currentRow * labelHeight);

                    // --- DESENHO DA ETIQUETA ---

                    // 1. Borda Completa (Caixa fechada nas 4 extremidades)
                    doc.setLineWidth(0.3); // Espessura mais fina (antes era 0.8)
                    doc.setDrawColor(0); // Cor preta
                    doc.rect(x, y, labelWidth, labelHeight); // Desenha o retângulo ao redor de toda a etiqueta
                    
                    // Reseta espessura para o padrão
                    doc.setLineWidth(0.2); 

                    // 2. Textos (Alinhados à Esquerda)
                    const textPaddingX = 5; // Recuo do texto em relação à borda esquerda

                    doc.setFontSize(8);
                    doc.setFont("helvetica", "bold");
                    // y+6 para centralizar verticalmente na primeira 'linha' da etiqueta de 18mm
                    doc.text("CDEPAT", x + textPaddingX, y + 6, { align: "left" });

                    doc.setFontSize(10);
                    doc.setFont("helvetica", "normal");
                    // y+13 para a segunda 'linha'
                    doc.text(`Caixa: ${strNum}`, x + textPaddingX, y + 13, { align: "left" });

                    // 3. Código de Barras (Alinhado à Direita)
                    // Gera o código de barras no canvas oculto
                    JsBarcode(canvas, strNum, {
                        format: "CODE128",
                        displayValue: false, // Escondemos o texto do barcode pra usar o do jsPDF
                        margin: 0,
                        width: 4, // Aumenta densidade para leitura rápida
                        height: 40 // Altura interna do desenho
                    });

                    // Converte canvas para imagem JPEG
                    const barcodeDataURL = canvas.toDataURL("image/jpeg");
                    
                    // Medidas da imagem do barcode dentro da etiqueta
                    const barcodeWidth = 35;
                    const barcodeHeight = 12; // Achatado para caber nos 18mm totais
                    const barcodePaddingRight = 5; // Recuo em relação à borda direita

                    // Calcula X para alinhar à direita
                    const barcodeX = x + labelWidth - barcodeWidth - barcodePaddingRight;
                    // Centraliza verticalmente o barcode (18mm total - 12mm barcode = 6mm sobrando / 2 = 3mm top)
                    const barcodeY = y + 3;

                    // Insere imagem no PDF
                    doc.addImage(barcodeDataURL, 'JPEG', barcodeX, barcodeY, barcodeWidth, barcodeHeight);


                    // --- LÓGICA DE POSICIONAMENTO ---
                    currentCol++;
                    if (currentCol >= cols) {
                        currentCol = 0;
                        currentRow++;
                    }

                    // Se preencheu a folha inteira (16 linhas) e ainda tem etiquetas, cria nova página
                    if (currentRow >= rows && i < qtd - 1) {
                        doc.addPage();
                        currentCol = 0;
                        currentRow = 0;
                    }
                }

                // Salva o documento com nome dinâmico
                const fim = inicio + qtd - 1;
                doc.save(`Etiquetas_Caixas_${inicio}_ate_${fim}.pdf`);

                mostrarStatus('<i class="fa-solid fa-check-circle mr-1"></i> Sucesso! O PDF com as etiquetas na medida exata foi gerado.', 'bg-green-50 text-green-700 border-green-200');

            } catch (error) {
                console.error(error);
                mostrarStatus('<i class="fa-solid fa-circle-xmark mr-1"></i> Ocorreu um erro técnico ao gerar o PDF.', 'bg-red-50 text-red-700 border-red-200');
            } finally {
                // Restaura o botão
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-print"></i> GERAR PDF DE ETIQUETAS';
            }
        }

        function mostrarStatus(mensagem, classesCor) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = mensagem;
            statusDiv.className = `text-center p-4 rounded-xl text-sm font-bold border mt-4 block ${classesCor}`;
            statusDiv.classList.remove('hidden');
        }
    </script>
</body>
</html>
