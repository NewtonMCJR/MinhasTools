<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatador de Texto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Pequeno ajuste para a barra de rolagem do textarea ficar elegante */
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        textarea::-webkit-scrollbar-thumb { background: #c084fc; border-radius: 4px; }
        textarea::-webkit-scrollbar-thumb:hover { background: #a855f7; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <a href="index.html" class="inline-flex items-center text-purple-600 hover:text-purple-800 font-medium mb-6 transition-colors">
            <i class="fa-solid fa-arrow-left mr-2"></i> Voltar ao Painel
        </a>

        <div class="bg-white p-6 md:p-8 rounded-xl shadow-lg border-t-4 border-purple-500">
            
            <header class="mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-purple-700 flex items-center">
                        <i class="fa-solid fa-align-left mr-3 text-purple-200 bg-purple-600 rounded-lg p-2"></i>
                        Formatador de Texto
                    </h1>
                    <p class="text-sm text-gray-500 mt-1">Cole seu texto abaixo para contar palavras e aplicar formatações em lote.</p>
                </div>
                
                <div class="flex space-x-4 bg-purple-50 p-3 rounded-lg border border-purple-100">
                    <div class="text-center">
                        <span class="block text-xs font-bold text-purple-400 uppercase">Palavras</span>
                        <input type="text" readonly id="words" value="0 words" class="bg-transparent text-purple-800 font-bold w-20 text-center outline-none" />
                    </div>
                    <div class="w-px bg-purple-200"></div>
                    <div class="text-center">
                        <span class="block text-xs font-bold text-purple-400 uppercase">Caracteres</span>
                        <input type="text" readonly id="characters" value="0 chars" class="bg-transparent text-purple-800 font-bold w-20 text-center outline-none" />
                    </div>
                </div>
            </header>

            <div class="mb-4">
                <textarea id="thetext" rows="12" onkeyup="updatecounts();" onchange="updatecounts();" onfocus="updatecounts();" 
                    class="w-full p-4 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 font-mono text-sm resize-y" 
                    placeholder="Cole seu texto aqui :)"></textarea>
            </div>

            <div class="flex flex-wrap gap-2 mb-8">
                <button onclick="cleartext();" class="px-3 py-2 bg-red-50 text-red-600 hover:bg-red-100 rounded text-sm font-medium transition-colors border border-red-200">
                    <i class="fa-solid fa-trash-can mr-1"></i> Limpar
                </button>
                <button onclick="selectall();" class="px-3 py-2 bg-gray-50 text-gray-700 hover:bg-gray-200 rounded text-sm font-medium transition-colors border border-gray-200">
                    <i class="fa-solid fa-object-group mr-1"></i> Selecionar Tudo
                </button>
                <div class="w-px bg-gray-300 mx-2 hidden md:block"></div>
                <button onclick="uppercase();" class="px-3 py-2 bg-purple-50 text-purple-700 hover:bg-purple-100 rounded text-sm font-medium transition-colors border border-purple-200">
                    MAIÚSCULAS
                </button>
                <button onclick="lowercase();" class="px-3 py-2 bg-purple-50 text-purple-700 hover:bg-purple-100 rounded text-sm font-medium transition-colors border border-purple-200">
                    minúsculas
                </button>
                <button onclick="capitalizesentences();" class="px-3 py-2 bg-purple-50 text-purple-700 hover:bg-purple-100 rounded text-sm font-medium transition-colors border border-purple-200">
                    Letra da frase maiúscula
                </button>
                <button onclick="capitalizewords();" class="px-3 py-2 bg-purple-50 text-purple-700 hover:bg-purple-100 rounded text-sm font-medium transition-colors border border-purple-200">
                    Letra Das Palavras Maiúsculas
                </button>
            </div>

            <hr class="mb-6 border-gray-200">

            <div class="space-y-6 bg-gray-50 p-6 rounded-lg border border-gray-200">
                
                <div class="flex flex-col md:flex-row items-start md:items-center gap-3">
                    <button onclick="replacetext();" class="w-full md:w-auto px-4 py-2 bg-purple-600 text-white font-medium rounded hover:bg-purple-700 transition-colors shrink-0">
                        <i class="fa-solid fa-right-left mr-1"></i> Substituir
                    </button>
                    <input type="text" id="from" placeholder="Procurar por..." class="flex-1 px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-purple-500 focus:outline-none text-sm">
                    <span class="text-gray-500 font-medium shrink-0">por</span>
                    <input type="text" id="to" placeholder="Substituir por..." class="flex-1 px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-purple-500 focus:outline-none text-sm">
                    <label class="flex items-center space-x-2 text-sm text-gray-700 shrink-0 bg-white px-3 py-2 rounded border border-gray-300 cursor-pointer">
                        <input type="checkbox" id="cs" class="form-checkbox text-purple-600 rounded">
                        <span>Diferenciar Maiúsc/Minúsc</span>
                    </label>
                </div>

                <div class="flex flex-col md:flex-row items-start md:items-center gap-3">
                    <button onclick="addtext();" class="w-full md:w-auto px-4 py-2 bg-purple-600 text-white font-medium rounded hover:bg-purple-700 transition-colors shrink-0">
                        <i class="fa-solid fa-plus mr-1"></i> Adicionar
                    </button>
                    <input type="text" id="add" placeholder="Texto a adicionar... (%N = nova linha, %L = num linha)" class="flex-1 px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-purple-500 focus:outline-none text-sm">
                    <span class="text-gray-500 font-medium shrink-0">no</span>
                    <select id="addpos" class="px-3 py-2 border border-gray-300 rounded bg-white focus:ring-2 focus:ring-purple-500 focus:outline-none text-sm shrink-0">
                        <option value="start">Início</option>
                        <option value="end">Fim</option>
                    </select>
                    <span class="text-gray-500 font-medium shrink-0">de cada linha</span>
                </div>

                <div class="flex flex-col md:flex-row items-start md:items-center gap-3">
                    <button onclick="trimtext();" class="w-full md:w-auto px-4 py-2 bg-purple-600 text-white font-medium rounded hover:bg-purple-700 transition-colors shrink-0">
                        <i class="fa-solid fa-crop-simple mr-1"></i> Cortar
                    </button>
                    <span class="text-gray-500 font-medium shrink-0">os(as)</span>
                    <select id="trimpos" class="px-3 py-2 border border-gray-300 rounded bg-white focus:ring-2 focus:ring-purple-500 focus:outline-none text-sm shrink-0">
                        <option value="first">Primeiros</option>
                        <option value="last">Últimos</option>
                    </select>
                    <select id="trimnumber" class="px-3 py-2 border border-gray-300 rounded bg-white focus:ring-2 focus:ring-purple-500 focus:outline-none text-sm shrink-0">
                        <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                        <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                        <option value="7">7</option><option value="8">8</option><option value="9">9</option>
                        <option value="10">10</option><option value="11">11</option><option value="12">12</option>
                        <option value="13">13</option><option value="14">14</option><option value="15">15</option>
                        <option value="16">16</option><option value="17">17</option><option value="18">18</option>
                        <option value="19">19</option><option value="20">20</option>
                    </select>
                    <span class="text-gray-500 font-medium shrink-0">caracteres de cada linha</span>
                </div>

            </div>
        </div>
    </div>

    <script>
        function cleartext() {
            var t = document.getElementById("thetext");
            t.value = '';
            updatetextlength();
            updatewords();
        }

        function selectall() {
            var t = document.getElementById("thetext");
            t.focus();
            t.select();
        }

        function updatetextlength() {
            var t = document.getElementById("thetext");
            var c = document.getElementById("characters");
            c.value = t.value.length + ' chars';
        }

        function updatewords() {
            var t = document.getElementById("thetext");
            var char_count = t.value.length;
            
            if (char_count === 0) {
                document.getElementById("words").value = '0 words';
                return;
            }

            var fullStr = t.value + " ";
            var initial_whitespace_rExp = /^[^A-Za-z0-9]+/gi;
            var left_trimmedStr = fullStr.replace(initial_whitespace_rExp, "");
            var non_alphanumerics_rExp = /[^A-Za-z0-9]+/gi;
            var cleanedStr = left_trimmedStr.replace(non_alphanumerics_rExp, " ");
            var splitString = cleanedStr.split(" ");
            var word_count = splitString.length - 1;

            var w = document.getElementById("words");
            w.value = word_count + ' words';
        }

        function updatecounts() {
            updatetextlength();
            updatewords();
        }

        function uppercase() {
            var t = document.getElementById("thetext");
            t.value = t.value.toUpperCase();
            updatecounts();
        }

        function lowercase() {
            var t = document.getElementById("thetext");
            t.value = t.value.toLowerCase();
            updatecounts();
        }

        function capitalizewords() {
            var t = document.getElementById("thetext");
            t.value = (t.value + '').replace(/^(.)|\s(.)/g, function ($1) {
                return $1.toUpperCase();
            });
            updatecounts();
        }

        function capitalizesentences() {
            var t = document.getElementById("thetext");
            var tarray = t.value.split(".");
            var tstr = '';

            for (let i = 0; i < tarray.length; i++) {
                tarray[i] = ltrim(tarray[i], ' ');
                if(tarray[i].length > 0) {
                    tstr = tstr + tarray[i].substring(0, 1).toUpperCase() + tarray[i].slice(1).toLowerCase();
                }
                if (i < (tarray.length - 1)) tstr = tstr + '. ';
            }
            t.value = tstr;

            tarray = t.value.split("?");
            tstr = '';
            for (let i = 0; i < tarray.length; i++) {
                tarray[i] = ltrim(tarray[i], ' ');
                if(tarray[i].length > 0) {
                    tstr = tstr + tarray[i].substring(0, 1).toUpperCase() + tarray[i].slice(1);
                }
                if (i < (tarray.length - 1)) tstr = tstr + '? ';
            }
            t.value = tstr;

            tarray = t.value.split("!");
            tstr = '';
            for (let i = 0; i < tarray.length; i++) {
                tarray[i] = ltrim(tarray[i], ' ');
                if(tarray[i].length > 0) {
                    tstr = tstr + tarray[i].substring(0, 1).toUpperCase() + tarray[i].slice(1);
                }
                if (i < (tarray.length - 1)) tstr = tstr + '! ';
            }
            t.value = tstr;
            updatecounts();
        }

        function replacetext() {
            var t = document.getElementById("thetext");
            var from = document.getElementById("from");
            var to = document.getElementById("to");
            var cs = document.getElementById("cs");
            var scope;

            if(!from.value) return;

            var ff = from.value.replace(/%N/g, "\n");
            var tt = to.value.replace(/%N/g, "\n");

            if (cs.checked) scope = 'g';
            else scope = 'gi';

            var temp = t.value;
            temp = temp.replace(new RegExp(ff, scope), tt);
            t.value = temp;

            from.value = '';
            to.value = '';
            updatecounts();
        }

        function addtext() {
            var t = document.getElementById("thetext");
            var a = document.getElementById("add");
            var p = document.getElementById("addpos");
            
            if(!a.value) return;

            var tstr = '';
            var tarray = t.value.split("\n");

            if (p.value == 'start') {
                for (let i = 0; i < tarray.length; i++) {
                    let insert = a.value.replace(/%L/g, i + 1);
                    insert = insert.replace(/%N/g, "\n");
                    tstr = tstr + insert + tarray[i];
                    if (i < (tarray.length - 1)) tstr = tstr + "\n";
                }
                t.value = tstr;
            } else {
                for (let i = 0; i < tarray.length; i++) {
                    let insert = a.value.replace(/%L/g, i + 1);
                    insert = insert.replace(/%N/g, "\n");
                    tstr = tstr + tarray[i] + insert;
                    if (i < (tarray.length - 1)) tstr = tstr + "\n";
                }
                t.value = tstr;
            }

            a.value = '';
            updatecounts();
        }

        function ltrim(str, chars) {
            chars = chars || "\\s";
            return str.replace(new RegExp("^[" + chars + "]+", "g"), "");
        }

        function rtrim(str, chars) {
            chars = chars || "\\s";
            return str.replace(new RegExp("[" + chars + "]+$", "g"), "");
        }

        function trimtext() {
            var t = document.getElementById("thetext");
            var n = document.getElementById("trimnumber");
            var p = document.getElementById("trimpos");
            var tarray = t.value.split("\n");
            var tstr = '';

            if (p.value == 'first') {
                for (let i = 0; i < tarray.length; i++) {
                    tstr = tstr + tarray[i].substr(n.value) + "\n";
                }
                tstr = rtrim(tstr);
            } else {
                for (let i = 0; i < tarray.length; i++) {
                    let tlen = tarray[i].length;
                    let tpos = tlen - n.value;
                    tstr = tstr + tarray[i].substr(0, tpos > 0 ? tpos : 0) + "\n";
                }
                tstr = rtrim(tstr);
            }

            t.value = tstr;
            updatecounts();
        }

        // Inicializa contadores
        window.onload = updatecounts;
    </script>
</body>
</html>
